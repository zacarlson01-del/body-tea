[build]
  publish = "frontend/build"
  command = "npm --prefix frontend ci && npm --prefix frontend run build"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[redirects]]
  from = "/api/auth/signup"
  to = "/.netlify/functions/auth-signup"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/signin"
  to = "/.netlify/functions/auth-signin"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/refresh-token"
  to = "/.netlify/functions/auth-refresh-token"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/me"
  to = "/.netlify/functions/auth-me"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/logout"
  to = "/.netlify/functions/auth-logout"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/forgot-password"
  to = "/.netlify/functions/auth-forgot-password"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/validate-reset-token"
  to = "/.netlify/functions/auth-validate-reset-token"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/reset-password"
  to = "/.netlify/functions/auth-reset-password"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/profile-picture"
  to = "/.netlify/functions/profile-picture"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/support/create"
  to = "/.netlify/functions/support-create"
  status = 200
  force = true

# SPA redirect — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
